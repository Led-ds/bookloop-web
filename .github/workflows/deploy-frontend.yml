name: deploy-frontend.yml
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: bookloop-web
  ECR_REGISTRY: 817312833927.dkr.ecr.us-east-1.amazonaws.com
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:us-east-1:817312833927:service/bookloop-dev-frontend/d6effea9c8d54b81b3725b87d7473558

jobs:
  build-and-deploy:
    name: Build, Push ECR and Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # --- Validação de PR (espelha o "mvn test" do backend). Só em PR. ---
      - name: Setup Node.js 20
        if: github.event_name == 'pull_request'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        if: github.event_name == 'pull_request'
        run: npm ci
      - name: Build frontend (validação)
        if: github.event_name == 'pull_request'
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # --- Deploy: só em push na main / manual ---
      - name: Configure AWS credentials
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          docker build \
            --build-arg "VITE_API_URL=${VITE_API_URL}" \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            .

      - name: Push Docker image to ECR
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      - name: Start App Runner deployment
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          aws apprunner start-deployment \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --region "$AWS_REGION"
          
